version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=sistema-de-banca
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./data/backup:/backup
    ports:
      - "5443:5432"
    container_name: sistema-de-banca
