name: Visual Regression Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/server/**'
      - '.github/workflows/visual-regression.yml'

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        browser: [chromium]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
        working-directory: apps/web

      - name: Start PostgreSQL
        uses: harmon758/postgresql-action@v1
        with:
          postgresql version: '15'
          postgresql db: 'test_db'
          postgresql user: 'test_user'
          postgresql password: 'test_password'

      - name: Setup environment variables
        run: |
          echo "DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_db" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV
          echo "FRONTEND_URL=http://localhost:5173" >> $GITHUB_ENV

      - name: Run database migrations
        run: npm run migration:run
        working-directory: apps/server

      - name: Seed test database
        run: npm run seed
        working-directory: apps/server

      - name: Download baseline screenshots from main branch
        run: |
          # Try to download baseline screenshots from main branch artifacts
          gh run list --workflow="visual-regression.yml" --branch=main --limit=1 --json databaseId,conclusion \
            | jq -r '.[] | select(.conclusion=="success") | .databaseId' \
            | head -1 \
            | xargs -I {} gh run download {} --name visual-baselines --dir apps/web/tests/ || echo "No baseline found"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate baseline screenshots if none exist
        run: |
          if [ ! -d "tests/visual-baseline" ] || [ -z "$(ls -A tests/visual-baseline 2>/dev/null)" ]; then
            echo "No baseline screenshots found. Generating new baseline..."
            npm run visual:baseline
          fi
        working-directory: apps/web

      - name: Run visual regression tests
        run: npm run visual:compare
        working-directory: apps/web
        continue-on-error: true

      - name: Generate visual diff report
        if: always()
        run: npm run visual:diff
        working-directory: apps/web
        continue-on-error: true

      - name: Upload visual test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-test-results-${{ matrix.browser }}
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 30

      - name: Upload baseline screenshots (for main branch)
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' && always()
        with:
          name: visual-baselines
          path: apps/web/tests/visual-baseline/
          retention-days: 90

      - name: Process visual diff results
        if: always()
        id: visual-diff
        run: |
          cd apps/web
          
          # Count visual differences
          DIFF_COUNT=0
          if [ -d "test-results" ]; then
            DIFF_COUNT=$(find test-results -name "*-diff.png" | wc -l)
          fi
          
          echo "diff_count=$DIFF_COUNT" >> $GITHUB_OUTPUT
          
          # Create summary for PR comment
          if [ $DIFF_COUNT -gt 0 ]; then
            echo "has_diffs=true" >> $GITHUB_OUTPUT
            echo "## 📸 Visual Regression Test Results" > visual-summary.md
            echo "" >> visual-summary.md
            echo "❌ **$DIFF_COUNT visual differences detected**" >> visual-summary.md
            echo "" >> visual-summary.md
            echo "### Changed Screenshots:" >> visual-summary.md
            
            # List all diff files
            find test-results -name "*-diff.png" | head -10 | while read diff_file; do
              base_name=$(basename "$diff_file" -diff.png)
              echo "- \`$base_name\`" >> visual-summary.md
            done
            
            if [ $DIFF_COUNT -gt 10 ]; then
              echo "- ... and $((DIFF_COUNT - 10)) more" >> visual-summary.md
            fi
            
            echo "" >> visual-summary.md
            echo "### How to Review:" >> visual-summary.md
            echo "1. Download the \`visual-test-results-${{ matrix.browser }}\` artifact from this workflow" >> visual-summary.md
            echo "2. Extract and open \`test-results/\` directory" >> visual-summary.md
            echo "3. For each diff:" >> visual-summary.md
            echo "   - \`*-expected.png\` = baseline (current main branch)" >> visual-summary.md
            echo "   - \`*-actual.png\` = your changes" >> visual-summary.md
            echo "   - \`*-diff.png\` = highlighted differences" >> visual-summary.md
            echo "" >> visual-summary.md
            echo "### Next Steps:" >> visual-summary.md
            echo "- If changes are **intentional**: Update baselines with \`npm run visual:update\`" >> visual-summary.md
            echo "- If changes are **unintentional**: Fix the visual issues" >> visual-summary.md
          else
            echo "has_diffs=false" >> $GITHUB_OUTPUT
            echo "## 📸 Visual Regression Test Results" > visual-summary.md
            echo "" >> visual-summary.md
            echo "✅ **No visual differences detected**" >> visual-summary.md
            echo "" >> visual-summary.md
            echo "All screenshots match the baseline. Great job! 🎉" >> visual-summary.md
          fi

      - name: Comment PR with visual diff results
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const path = 'apps/web/visual-summary.md';
            
            if (fs.existsSync(path)) {
              const summary = fs.readFileSync(path, 'utf8');
              
              // Find existing comment
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              });
              
              const existingComment = comments.data.find(comment => 
                comment.body.includes('📸 Visual Regression Test Results')
              );
              
              const commentBody = summary + '\n\n---\n*Updated: ' + new Date().toISOString() + '*';
              
              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: commentBody
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: commentBody
                });
              }
            }

      - name: Set workflow status
        if: always()
        run: |
          if [ "${{ steps.visual-diff.outputs.has_diffs }}" = "true" ]; then
            echo "❌ Visual differences detected. Review required."
            exit 1
          else
            echo "✅ No visual differences detected."
            exit 0
          fi