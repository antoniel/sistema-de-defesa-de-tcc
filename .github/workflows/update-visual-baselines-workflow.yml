name: Update Visual Baselines

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update baselines for'
        required: true
        default: 'main'
        type: string
      commit_message:
        description: 'Commit message for baseline update'
        required: false
        default: 'chore: update visual regression baselines'
        type: string

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: |
          cd apps/web
          npx playwright install chromium
          npx playwright install-deps

      - name: Start Docker services
        run: npm run docker:up

      - name: Wait for database
        run: |
          timeout 60 bash -c 'until nc -z localhost 5432; do sleep 1; done'

      - name: Run database migrations
        run: npm run migration:run

      - name: Seed test data
        run: npm run seed

      - name: Update visual baselines
        run: |
          cd apps/web
          npm run test:visual:update
        env:
          CI: true

      - name: Commit updated baselines
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add all screenshots
          git add apps/web/test-results/
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No visual baseline changes to commit"
          else
            git commit -m "${{ inputs.commit_message }}"
            git push
            echo "Visual baselines updated and committed"
          fi

      - name: Upload updated baselines
        uses: actions/upload-artifact@v4
        with:
          name: updated-visual-baselines
          path: apps/web/test-results/screenshots/
          retention-days: 30

      - name: Stop Docker services
        if: always()
        run: npm run docker:down